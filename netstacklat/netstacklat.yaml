metrics:
  histograms:
    - name: netstack_latency_seconds
      help: Netstack ingress latency up to a certain point in the kernel
      bucket_type: exp2
      bucket_min: 0
      bucket_max: 30
      bucket_multiplier: 0.000000001 # nanoseconds to seconds
      labels:
        - name: hook_id
          size: 4
          decoders:
            - name: uint
            - name: static_map
              static_map:
                0: invalid
                1: tcp_v4_do_rcv
                2: tcp_data_queue
                3: udp_queue_rcv_one
        - name: bucket
          size: 4
          decoders:
            - name: uint
